name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.14"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package and lint tool
        run: python -m pip install . "ruff>=0.15,<0.16"
      - name: Lint
        run: ruff check .
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Check Python and shell syntax
        run: |
          python -m compileall -q studio
          bash -n scripts/launch.sh scripts/launch-zellij.sh scripts/status.sh
      - name: Verify dependencies and wheel
        run: |
          python -m pip check
          python -m pip wheel . --no-deps --wheel-dir /tmp/studio-wheel
