name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.14"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package and lint tool
        run: python -m pip install . "ruff>=0.15,<0.16"
      - name: Lint
        run: ruff check .
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Check Python and shell syntax
        run: |
          python -m compileall -q studio
          for script in scripts/launch.sh scripts/launch-zellij.sh scripts/runtime-state.sh scripts/status.sh; do
            bash -n "$script"
          done
      - name: Verify dependencies and wheel
        run: |
          python -m pip check
          python -m pip wheel . --no-deps --wheel-dir /tmp/studio-wheel

  integration:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: python -m pip install .
      - name: Install verified Zellij release
        env:
          GH_TOKEN: ${{ github.token }}
          ZELLIJ_VERSION: v0.44.3
        run: |
          set -euo pipefail
          destination="$RUNNER_TEMP/zellij"
          archive="zellij-x86_64-unknown-linux-musl.tar.gz"
          checksum="zellij-x86_64-unknown-linux-musl.sha256sum"
          mkdir -p "$destination"
          gh release download "$ZELLIJ_VERSION" \
            --repo zellij-org/zellij \
            --pattern "$archive" \
            --pattern "$checksum" \
            --dir "$destination"
          tar -xzf "$destination/$archive" -C "$destination"
          expected="$(awk 'NR == 1 {print $1}' "$destination/$checksum")"
          test -n "$expected"
          (cd "$destination" && printf '%s  zellij\n' "$expected" | sha256sum --check -)
          echo "$destination" >> "$GITHUB_PATH"
      - name: Exercise live Redis and Zellij backends
        env:
          STUDIO_REDIS_INTEGRATION: "1"
          STUDIO_REDIS_URL: redis://127.0.0.1:6379
          STUDIO_ZELLIJ_INTEGRATION: "1"
        run: python -m unittest discover -s tests -p 'test_integration.py' -v
